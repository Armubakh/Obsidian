<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Tournament Bracket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background: #050510; color: #fff; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .synth-bg { background: linear-gradient(to bottom, #050510 0%, #1a0b2e 100%); position: fixed; inset: 0; z-index: -1; }
        .synth-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(109, 40, 217, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(109, 40, 217, 0.15) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); transform-origin: center top; animation: gridMove 20s linear infinite; }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 100%; } }
        .glass-card { background: rgba(10, 10, 25, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(139, 92, 246, 0.3); }
        .brand-logo { filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.5)); transition: transform 0.3s ease; }
        .brand-logo:hover { transform: scale(1.1); }
        .nav-link { font-size: 10px; font-weight: 900; letter-spacing: 0.2em; cursor: pointer; transition: all 0.3s ease; white-space: nowrap; }
        @media (min-width: 1024px) { .nav-link { letter-spacing: 0.4em; } }
        .nav-link.active { color: #8b5cf6; text-decoration: underline; text-underline-offset: 8px; text-shadow: 0 0 15px rgba(139, 92, 246, 0.8); }
        .bracket-container { border-radius: 1.5rem; overflow: hidden; border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: 0 0 30px rgba(34, 211, 238, 0.1); background: #0b0b14; }
        
        .pfp-icon { width: 35px; height: 35px; border-radius: 50%; border: 2px solid rgba(34, 211, 238, 0.5); object-fit: cover; transition: transform 0.3s ease, border-color 0.3s ease; cursor: pointer; }
        .pfp-icon:hover { transform: scale(1.1); border-color: #fff; }
        
        .profile-dropdown { transform-origin: top right; transition: all 0.2s ease; transform: scale(0.95); opacity: 0; pointer-events: none; }
        .profile-dropdown.show { transform: scale(1); opacity: 1; pointer-events: auto; }

        .bracket-container iframe {
            filter: hue-rotate(260deg) saturate(2) brightness(0.9) contrast(1.2);
            transition: filter 0.3s ease;
        }
        .bracket-container:hover iframe {
            filter: hue-rotate(260deg) saturate(2.5) brightness(1) contrast(1.2);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="synth-bg"><div class="synth-grid"></div></div>

    <nav class="fixed top-0 w-full z-50 p-4 lg:p-6 lg:px-12 flex flex-wrap items-center justify-between gap-y-4 bg-gradient-to-b from-black/95 to-black/80 lg:to-transparent backdrop-blur-md">
        <div class="flex items-center gap-4 cursor-pointer order-1" onclick="window.location.href='index.html'">
            <img src="Gemini_Generated_Image_vhy17gvhy17gvhy1-removebg-preview.png" class="brand-logo w-10 lg:w-[45px]" alt="Logo">
            <div>
                <h1 class="font-orbitron text-lg lg:text-xl font-black text-cyan-400 tracking-tighter uppercase">Obsidian</h1>
                <p class="text-[7px] lg:text-[8px] text-fuchsia-500 tracking-[0.4em] uppercase font-bold">Gaming Redefined</p>
            </div>
        </div>

        <div class="flex items-center justify-start lg:justify-end gap-6 lg:gap-8 order-2 w-full lg:w-auto mt-2 lg:mt-0 overflow-x-auto hide-scrollbar">
            <div class="flex items-center gap-6 lg:gap-8 font-orbitron uppercase text-white/50 pb-2 lg:pb-0 shrink-0">
                <a href="index.html" class="nav-link hover:text-white">HOME</a>
                <a href="tournament.html" class="nav-link hover:text-white">MATCHES</a>
                <a href="bracket.html" class="nav-link active text-cyan-400">BRACKETS</a>
                <a href="marketplace.html" class="nav-link hover:text-white">MARKETPLACE</a>
                <a href="chats.html" class="nav-link hover:text-white">CHATS</a>
            </div>

            <div class="relative shrink-0 pb-2 lg:pb-0 z-50 ml-auto lg:ml-0">
                <img id="navPfp" src="" alt="Profile" class="pfp-icon cursor-pointer" onclick="toggleDropdown(event)" onerror="this.src='https://i.pravatar.cc/300?u=obsidian'">
                
                <div id="profileMenu" class="profile-dropdown absolute right-0 top-full mt-4 w-64 bg-[rgba(10,10,25,0.98)] backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-5 z-50">
                    <div class="border-b border-white/5 pb-4 mb-4">
                        <p class="font-orbitron text-[10px] tracking-widest text-white/40 uppercase mb-2">Signed in as</p>
                        <p id="dropdownName" class="font-orbitron font-black text-cyan-400 text-sm md:text-base tracking-[0.2em] uppercase truncate">USER</p>
                    </div>
                    <button onclick="window.location.href='portfolio.html'" class="w-full text-left py-2 text-[10px] md:text-xs font-orbitron font-bold text-white hover:text-cyan-400 transition tracking-widest uppercase flex items-center gap-3 mb-2">
                        <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        Edit Profile
                    </button>
                    <button onclick="handleLogout()" class="w-full text-left py-2 text-[10px] md:text-xs font-orbitron font-bold text-red-400 hover:text-red-300 transition tracking-widest uppercase flex items-center gap-3">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        Log Out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-7xl mt-40 lg:mt-32 mb-20 px-4 lg:px-6 flex flex-col lg:flex-row gap-6 lg:gap-8">
        
        <!-- SIDEBAR -->
        <aside class="w-full lg:w-1/3 flex flex-col gap-6">
            
            <!-- CREATE TOURNAMENT CARD -->
            <div class="glass-card rounded-[2rem] p-6 lg:p-8 text-center relative overflow-hidden">
                <div id="createTourneyArea" class="w-full space-y-6">
                    <h3 class="font-orbitron text-cyan-400 font-black text-xs lg:text-sm tracking-[0.3em] uppercase border-b border-white/10 pb-4">Tournament Setup</h3>
                    
                    <div class="space-y-4 text-left">
                        <div>
                            <label class="font-orbitron text-[8px] lg:text-[9px] text-white/50 tracking-widest uppercase ml-2">Tournament Name</label>
                            <input type="text" id="customTourneyName" placeholder="e.g. Obsidian Winter Cup" class="w-full bg-white/5 border border-white/10 p-3 lg:p-4 rounded-xl text-xs outline-none focus:border-cyan-400 text-white transition mt-1">
                        </div>
                        <div>
                            <label class="font-orbitron text-[8px] lg:text-[9px] text-white/50 tracking-widest uppercase ml-2">Game Title</label>
                            <select id="customGame" class="w-full bg-[#0a0a19] border border-white/10 p-3 lg:p-4 rounded-xl text-xs outline-none focus:border-cyan-400 text-white transition mt-1 appearance-none">
                                <option value="Valorant">Valorant</option>
                                <option value="CS2">Counter-Strike 2</option>
                                <option value="Fortnite">Fortnite</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="font-orbitron text-[8px] lg:text-[9px] text-white/50 tracking-widest uppercase ml-2">Format</label>
                            <input type="text" id="customFormat" placeholder="e.g. 5v5, Solo, Squads" class="w-full bg-white/5 border border-white/10 p-3 lg:p-4 rounded-xl text-xs outline-none focus:border-cyan-400 text-white transition mt-1">
                        </div>
                    </div>
                </div>
            </div>

            <!-- FIND EXISTING BRACKET CARD -->
            <div class="glass-card rounded-[2rem] p-6 lg:p-8 text-center relative overflow-hidden border-fuchsia-500/30">
                <h3 class="font-orbitron text-fuchsia-400 font-black text-xs lg:text-sm tracking-[0.3em] uppercase border-b border-fuchsia-500/20 pb-4 mb-6">Load Existing Bracket</h3>
                
                <div class="space-y-4 text-left">
                    <div>
                        <label class="font-orbitron text-[8px] lg:text-[9px] text-white/50 tracking-widest uppercase ml-2">Search by Tournament Name</label>
                        <input type="text" id="searchTourneyName" placeholder="e.g. Obsidian Winter Cup" class="w-full bg-white/5 border border-white/10 p-3 lg:p-4 rounded-xl text-xs outline-none focus:border-fuchsia-400 text-white transition mt-1">
                    </div>
                </div>

                <button onclick="loadExistingBracket()" id="loadBracketBtn" class="w-full py-4 mt-6 bg-gradient-to-r from-purple-600 to-fuchsia-500 hover:scale-[1.02] rounded-xl font-orbitron font-black text-[10px] lg:text-[11px] tracking-[0.4em] transition shadow-[0_0_20px_rgba(217,70,239,0.4)]">
                    LOAD BRACKET
                </button>
            </div>

            <!-- SCORE REPORTER CARD (For Organizers) -->
            <div class="glass-card rounded-[2rem] p-6 lg:p-8 text-center relative overflow-hidden border-cyan-500/30">
                <h3 class="font-orbitron text-cyan-400 font-black text-xs lg:text-sm tracking-[0.3em] uppercase border-b border-cyan-500/20 pb-4 mb-6 flex items-center justify-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    Report Live Score
                </h3>
                
                <div class="space-y-4 text-left">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="font-orbitron text-[8px] lg:text-[9px] text-white/50 tracking-widest uppercase ml-2">Team 1 Score</label>
                            <input type="number" id="team1Score" placeholder="0" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-center text-lg font-bold outline-none focus:border-cyan-400 text-white transition mt-1">
                        </div>
                        <div>
                            <label class="font-orbitron text-[8px] lg:text-[9px] text-white/50 tracking-widest uppercase ml-2">Team 2 Score</label>
                            <input type="number" id="team2Score" placeholder="0" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-center text-lg font-bold outline-none focus:border-cyan-400 text-white transition mt-1">
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-orbitron text-[8px] lg:text-[9px] text-white/50 tracking-widest uppercase ml-2">Select Live Match</label>
                            <button onclick="fetchLiveMatches()" class="text-[8px] text-cyan-400 hover:text-white transition uppercase font-bold tracking-widest">↻ Refresh</button>
                        </div>
                        <select id="targetMatchId" class="w-full bg-black/50 border border-white/10 p-3 rounded-xl text-xs outline-none focus:border-cyan-400 text-white transition mt-1 appearance-none">
                            <option value="">Load a bracket first...</option>
                        </select>
                    </div>
                </div>

                <button onclick="submitScoreUpdate()" id="updateScoreBtn" class="w-full py-4 mt-6 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl font-orbitron font-black text-[10px] lg:text-[11px] tracking-[0.4em] transition text-white">
                    PUSH UPDATE
                </button>
            </div>

        </aside>

        <!-- MAIN BRACKET CONTENT -->
        <section class="w-full lg:w-2/3 flex flex-col">
            <div class="glass-card rounded-[2rem] p-4 lg:p-6 h-full flex flex-col">
                <div class="flex flex-wrap justify-between items-center mb-6 px-2 gap-4">
                    <h3 class="font-orbitron text-lg lg:text-xl font-black tracking-widest uppercase text-white">Live Bracket</h3>
                    <span class="flex items-center gap-2 text-[8px] lg:text-[9px] font-orbitron tracking-widest uppercase text-fuchsia-400 font-bold bg-fuchsia-500/10 border border-fuchsia-500/30 px-3 py-1.5 rounded-full">
                        <div class="w-2 h-2 rounded-full bg-fuchsia-500 animate-pulse"></div> Auto-Updating
                    </span>
                </div>
                
                <div class="bracket-container flex-1 min-h-[400px] lg:min-h-[600px] w-full relative">
                    <div id="bracketContainer" class="w-full min-h-[400px] lg:min-h-[600px] flex items-center justify-center border border-white/10 rounded-[1.5rem] lg:rounded-[2rem] bg-black/40 mt-4 lg:mt-8">
                        <p class="text-white/30 font-orbitron text-[10px] lg:text-xs tracking-widest uppercase px-4 text-center">No bracket generated yet.</p>
                    </div>
                    
                    <div class="mb-4 lg:mb-6 mt-4 lg:mt-6 px-4">
                        <label class="font-orbitron text-[9px] lg:text-[10px] text-cyan-400 tracking-[0.3em] uppercase mb-3 block font-bold">Participating Teams (One per line)</label>
                        <textarea 
                            id="teamListInput" 
                            rows="5" 
                            class="w-full bg-black/50 border border-white/10 rounded-2xl p-3 lg:p-4 text-[10px] lg:text-[11px] font-orbitron text-white outline-none focus:border-cyan-400 transition shadow-[inset_0_0_20px_rgba(0,0,0,0.5)] resize-none placeholder-white/20" 
                            placeholder="Sentinels&#10;LOUD&#10;Paper Rex&#10;Gen.G"
                        ></textarea>
                        <p class="text-[8px] lg:text-[9px] text-white/30 uppercase tracking-widest mt-2">Enter 4, 8, 16, or 32 teams for a perfect bracket.</p>
                    </div>
                    <button onclick="generateBracket()" class="w-[90%] mx-auto block bg-gradient-to-r from-cyan-500 to-blue-600 hover:scale-[1.02] transition shadow-[0_0_15px_rgba(6,182,212,0.4)] text-white px-4 lg:px-8 py-3 lg:py-4 rounded-xl lg:rounded-2xl font-orbitron text-[10px] lg:text-[12px] tracking-widest font-black uppercase mb-4">
                        Generate New Bracket
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        async function generateBracket() {
            const container = document.getElementById('bracketContainer');
            const rawText = document.getElementById('teamListInput').value;
            const dynamicTeams = rawText.split('\n').map(team => team.trim()).filter(team => team !== "");
            
            const tourneyName = document.getElementById('customTourneyName').value || "Custom Tournament";
            const gameTitle = document.getElementById('customGame').value;
            const tourneyFormat = document.getElementById('customFormat').value || "TBD";

            if (dynamicTeams.length < 2) {
                alert("Please enter at least 2 teams to generate a bracket.");
                return;
            }

            container.innerHTML = '<p class="text-cyan-400 font-orbitron text-[10px] lg:text-xs animate-pulse text-center w-full">BUILDING BRACKET ARCHITECTURE...</p>';

            try {
                const generateResponse = await fetch('https://obsidian-oda1.onrender.com/api/bracket/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tournament_name: tourneyName, 
                        game: gameTitle,
                        teams: dynamicTeams
                    })
                });

                const data = await generateResponse.json();

                if (generateResponse.ok) {
                    container.innerHTML = `
                        <iframe 
                            src="${data.iframe_url}" 
                            width="100%" 
                            height="100%" 
                            frameborder="0" 
                            scrolling="auto" 
                            allowtransparency="true"
                            style="min-height: 400px; border-radius: 1.5rem;"
                            class="lg:min-h-[500px]">
                        </iframe>
                    `;

                    const token = localStorage.getItem('obsidian_token');
                    if (token) {
                        await fetch('https://obsidian-oda1.onrender.com/api/save-bracket', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                tournament_name: tourneyName,
                                game: gameTitle,
                                format: tourneyFormat,
                                teams_count: dynamicTeams.length,
                                bracket_url: data.iframe_url
                            })
                        });
                    }
                } else {
                    container.innerHTML = '<p class="text-red-500 text-center w-full text-xs">API Error: Check Node.js Console</p>';
                }
            } catch (error) {
                console.error("Network Error:", error);
                container.innerHTML = '<p class="text-red-500 text-center w-full text-xs">Failed to connect to Obsidian Backend.</p>';
            }
        }

        async function loadExistingBracket() {
            const searchInput = document.getElementById('searchTourneyName').value.trim();
            const btn = document.getElementById('loadBracketBtn');
            const container = document.getElementById('bracketContainer');
            const token = localStorage.getItem('obsidian_token');

            if (!searchInput) {
                alert("Please enter a tournament name to search.");
                return;
            }

            if (!token) return alert("Please log in first.");

            btn.innerText = "SEARCHING...";
            btn.classList.add('animate-pulse');

            try {
                const response = await fetch(`https://obsidian-oda1.onrender.com/api/get-bracket?name=${encodeURIComponent(searchInput)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    container.innerHTML = `
                        <iframe 
                            src="${data.bracket_url}" 
                            width="100%" 
                            height="100%" 
                            frameborder="0" 
                            scrolling="auto" 
                            allowtransparency="true"
                            style="min-height: 400px; border-radius: 1.5rem;"
                            class="lg:min-h-[500px]">
                        </iframe>
                    `;
                } else {
                    alert(data.message || "Bracket not found.");
                }
            } catch (error) {
                console.error("Error loading bracket:", error);
                alert("Failed to connect to the backend database.");
            } finally {
                btn.innerText = "LOAD BRACKET";
                btn.classList.remove('animate-pulse');
            }
        }
        
        async function fetchLiveMatches() {
            const dropdown = document.getElementById('targetMatchId');
            
            // Get the active tournament URL/Name from your existing inputs
            const activeTournamentId = document.getElementById('searchTourneyName').value || document.getElementById('customTourneyName').value; 

            if (!activeTournamentId) {
                alert("Please generate or load a tournament bracket first.");
                return;
            }

            dropdown.innerHTML = '<option value="">Syncing with Challonge...</option>';
            const token = localStorage.getItem('obsidian_token');

            try {
                const response = await fetch(`https://obsidian-oda1.onrender.com/api/get-matches?tournament_id=${activeTournamentId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const matches = await response.json();

                if (response.ok) {
                    dropdown.innerHTML = '<option value="">Select a match to report...</option>';
                    
                    if (matches.length === 0) {
                        dropdown.innerHTML = '<option value="">No open matches found.</option>';
                        return;
                    }

                    // Populate the dropdown with actual Match IDs
                    matches.forEach(match => {
                        dropdown.innerHTML += `<option value="${match.id}">Match ${match.identifier} (ID: ${match.id})</option>`;
                    });
                } else {
                    dropdown.innerHTML = '<option value="">Failed to load matches.</option>';
                }
            } catch (error) {
                console.error("Error fetching matches:", error);
                dropdown.innerHTML = '<option value="">Connection error.</option>';
            }
        }
        
        async function submitScoreUpdate() {
            const t1Score = parseInt(document.getElementById('team1Score').value) || 0;
            const t2Score = parseInt(document.getElementById('team2Score').value) || 0;
            const matchId = document.getElementById('targetMatchId').value;
            
            // Gets the active tournament from the search or creation field
            const activeTournamentId = document.getElementById('searchTourneyName').value || document.getElementById('customTourneyName').value || "YOUR_TOURNAMENT_URL_OR_ID_HERE"; 

            if (!matchId) return alert("Please enter a Match ID.");

            // Determine winner (simplified logic for 1v1 formats)
            const winnerId = t1Score > t2Score ? "TEAM_1_ID" : "TEAM_2_ID"; 

            const btn = document.getElementById('updateScoreBtn');
            btn.innerText = "PUSHING...";
            btn.classList.add('animate-pulse');

            const token = localStorage.getItem('obsidian_token');

            try {
                const response = await fetch('https://obsidian-oda1.onrender.com/api/update-match', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        tournament_id: activeTournamentId,
                        match_id: matchId,
                        player1_score: t1Score,
                        player2_score: t2Score,
                        winner_id: winnerId
                    })
                });

                if (response.ok) {
                    alert("Score Updated! The bracket will now refresh.");
                    // Refresh the iframe to show the live changes
                    const iframe = document.querySelector('iframe');
                    if(iframe) iframe.src = iframe.src; 
                } else {
                    alert("Failed to update score. Check IDs and API limits.");
                }
            } catch (error) {
                console.error("Error pushing score:", error);
                alert("Backend communication failed.");
            } finally {
                btn.innerText = "PUSH UPDATE";
                btn.classList.remove('animate-pulse');
            }
        }

        async function checkAuth() {
            const token = localStorage.getItem('obsidian_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const response = await fetch('https://obsidian-oda1.onrender.com/api/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Failed to load profile');
                const userData = await response.json();

                const dropdownName = document.getElementById('dropdownName');
                if (dropdownName) dropdownName.textContent = userData.username;

                const navPfp = document.getElementById('navPfp');
                if (navPfp) {
                    if (userData.profile_pic_url && userData.profile_pic_url !== 'null' && userData.profile_pic_url !== 'default_pfp.jpg') {
                        navPfp.src = userData.profile_pic_url;
                    } else {
                        navPfp.src = `https://ui-avatars.com/api/?name=${userData.username}&background=0a0a19&color=22d3ee`;
                    }
                }

            } catch (error) {
                console.error(error);
                localStorage.removeItem('obsidian_token');
                window.location.href = 'login.html';
            }
        }
        
        function toggleDropdown(event) { 
            event.stopPropagation(); 
            document.getElementById('profileMenu').classList.toggle('show'); 
        }

        window.addEventListener('click', function(event) {
            if (!event.target.matches('#navPfp')) {
                const menu = document.getElementById('profileMenu');
                if (menu && menu.classList.contains('show')) menu.classList.remove('show');
            }
        });

        function handleLogout() { 
            localStorage.removeItem('obsidian_token'); 
            window.location.href = 'login.html'; 
        }

        window.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
